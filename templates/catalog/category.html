{% extends "../base.html" %}
{% block title %}Vila Store{% endblock %}

{% block content %}    
    <div class="row">
        <div class="col-md-12 text-center">
            <h2>{{ category.name|title }}</h2>
        </div>
    </div>
    {% if not products %}
    <div class="row">
        <div class="col-md-12 text-center">Actualmente no hay productos bajo esta categoría</div>
    </div>
    {% else %}
        {% include "./product-list.html" %}
    {%endif%}

{% endblock %}
