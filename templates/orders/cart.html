{% extends "../base.html" %}
{% block title %}Vila Store - Resumen de Carrito{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-12 text-center">
            <h2>Resumen de Carrito</h2>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            {% if cart|length == 0 %}
                <p class="text-center">Tu carrito está vacío</p>
            {% else %}
                <table class="table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cant.</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            {% endif %}
        </div>
    </div>

</div>
{% endblock %}
